<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý nợ - CNTH Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="debt.css" />
  </head>
  <body class="p-6 md:p-10 bg-[#f8fafc]">
    <header
      class="flex justify-between items-center mb-10 max-w-[1400px] mx-auto"
    >
      <div class="flex items-center space-x-4">
        <img src="../images/logo.png" class="h-10" alt="Logo" />
        <h1 class="text-3xl font-bold text-gray-800">Quản lý nợ</h1>
      </div>
      <button
        class="bg-[#4f46e5] text-white px-8 py-2.5 rounded-xl font-bold shadow-md hover:bg-[#4338ca] transition"
      >
        + Thêm
      </button>
    </header>

    <main class="max-w-[1400px] mx-auto space-y-8">
      <div
        class="debt-banner-gradient rounded-[32px] p-10 flex items-center shadow-lg relative overflow-hidden"
      >
        <div class="bg-yellow-400 p-5 rounded-2xl mr-8 shadow-inner">
          <img src="../images/credit-card.png" class="h-16" alt="Card Icon" />
        </div>
        <div>
          <h2 class="text-xl font-bold text-white/90">Tổng nợ:</h2>
          <p
            class="text-5xl font-bold text-white mt-1 mono"
            id="total-debt-banner"
          >
            0 VND
          </p>
        </div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <div
          class="bg-white rounded-[32px] p-8 shadow-sm border border-gray-100"
        >
          <div class="flex items-center mb-6">
            <img src="../images/bank.png" class="h-12 mr-5" alt="Bank" />
            <div>
              <h3 class="text-lg font-bold text-gray-800">Khoản vay</h3>
              <p
                class="text-3xl font-bold text-gray-900 mono"
                id="loan-amount-display"
              >
                0 VND
              </p>
            </div>
          </div>
          <div
            class="w-full bg-[#ef4444] h-7 rounded-full overflow-hidden flex shadow-inner"
          >
            <div
              id="loan-bar"
              class="bg-[#3b82f6] h-full transition-all duration-1000"
              style="width: 0%"
            ></div>
          </div>
          <p class="mt-3 font-bold text-sm">
            <span class="text-blue-500" id="loan-percent-text">0%</span>
            <span class="text-gray-400">đã trả</span>
          </p>
        </div>

        <div
          class="bg-white rounded-[32px] p-8 shadow-sm border border-gray-100"
        >
          <div class="flex items-center mb-6">
            <img
              src="../images/credit-card-1.png"
              class="h-12 mr-5"
              alt="Credit Card"
            />
            <div>
              <h3 class="text-lg font-bold text-gray-800">Thẻ tín dụng</h3>
              <p
                class="text-3xl font-bold text-gray-900 mono"
                id="credit-amount-display"
              >
                0 VND
              </p>
            </div>
          </div>
          <div
            id="credit-bar-container"
            class="w-full bg-gray-200 h-7 rounded-full shadow-inner overflow-hidden flex"
          >
            <div
              id="credit-bar"
              class="bg-[#3b82f6] h-full transition-all duration-1000"
              style="width: 0%"
            ></div>
          </div>
          <p
            class="mt-3 font-bold text-sm text-gray-400"
            id="credit-status-text"
          >
            Chưa có khoản nợ
          </p>
        </div>
      </div>

      <div class="bg-white rounded-[32px] p-8 shadow-sm border border-gray-100">
        <h3 class="text-xl font-bold text-gray-800 mb-6">Tiến độ trả nợ</h3>

        <div class="flex justify-between items-end mb-4 px-2">
          <p class="text-lg font-bold">
            <span class="text-blue-500" id="total-paid-value">0</span>
            <span class="text-gray-400"
              >/ <span id="total-loan-value">0</span> VND</span
            >
          </p>
        </div>

        <div
          class="w-full bg-[#ef4444] h-10 rounded-full overflow-hidden flex shadow-lg border-2 border-white relative"
        >
          <div
            id="overall-bar"
            class="bg-[#3b82f6] h-full transition-all duration-1000 shadow-[inset_-4px_0_10px_rgba(0,0,0,0.1)]"
            style="width: 0%"
          ></div>
        </div>

        <div class="flex space-x-12 mt-6 font-bold text-base">
          <div class="flex items-center">
            <span
              class="w-4 h-4 bg-blue-500 rounded-full mr-3 shadow-sm"
            ></span>
            <span class="text-gray-500"
              >Đã trả:
              <span class="text-blue-500" id="label-paid">0%</span></span
            >
          </div>
          <div class="flex items-center">
            <span class="w-4 h-4 bg-red-500 rounded-full mr-3 shadow-sm"></span>
            <span class="text-gray-500"
              >Còn lại:
              <span class="text-red-500" id="label-remain">0%</span></span
            >
          </div>
        </div>
      </div>

      <section
        class="bg-white rounded-[32px] shadow-sm border border-gray-100 overflow-hidden"
      >
        <div class="p-6 bg-gray-50/50 border-b border-gray-100">
          <h3 class="text-xl font-bold text-gray-800">Thanh toán gần đây</h3>
        </div>
        <table class="w-full text-left">
          <tbody
            id="payment-history-table"
            class="divide-y divide-gray-100"
          ></tbody>
        </table>
      </section>

      <button class="text-blue-500 font-bold text-xl" onclick="history.back()">
        < Quay lại
      </button>
    </main>

    <script src="debt.js"></script>
  </body>
</html>
