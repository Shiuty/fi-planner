<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>FI Planner</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- HEADER -->
    <header class="header">
      <div class="logo">
        <img src="images/logo.png" />
        <h2>FI Planner</h2>
      </div>

      <div class="nav">
        <a href="#">Trang chủ</a>
        <a href="Login and Register/login.html">
          <button>Đăng nhập</button>
        </a>
      </div>
    </header>

    <!-- HERO -->
    <section class="hero">
      <div class="hero-content">
        <h1>
          Quản lý tài chính cá nhân &<br />
          Hoạch định tự do tài chính
        </h1>

        <p>
          Theo dõi thu nhập, chi tiêu, nợ và lập kế hoạch đạt tự do tài chính
        </p>

        <a href="Login and Register/login.html">
          <button class="btn-main">Bắt đầu ngay</button>
        </a>
      </div>
    </section>

    <!-- FEATURES -->
    <section class="features">
      <div class="feature">
        <img src="images/icons8-wallet-53.png" />
        <p>
          Quản lý tài chính<br />
          dễ dàng
        </p>
      </div>

      <div class="feature">
        <img src="images/icons8-goal-96.png" />
        <p>
          Lập mục tiêu tự do<br />
          tài chính
        </p>
      </div>

      <div class="feature">
        <img src="images/icons8-chart-60.png" />
        <p>
          Xem tổng quan<br />
          Dashboard
        </p>
      </div>
    </section>
  </body>
</html>
