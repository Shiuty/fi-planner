<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CNTH Finance - FI Planner</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body class="min-h-screen flex">
    <main class="flex-1 p-4 md:p-10 overflow-y-auto">
      <header class="flex justify-between items-center mb-10">
        <div class="flex items-center space-x-4">
          <img src="../images/logo.png" class="h-10 w-auto" alt="Logo" />
          <h2 class="text-3xl font-bold text-gray-800">Dashboard</h2>
        </div>
      </header>

      <section class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
        <div class="card text-center">
          <span class="text-gray-400 text-sm mb-2 block">🏦 Thu nhập</span>
          <span class="text-2xl font-bold mono">20,000,000 VND</span>
        </div>
        <div class="card text-center">
          <span class="text-gray-400 text-sm mb-2 block">🛒 Chi tiêu</span>
          <span class="text-2xl font-bold mono">8,500,000 VND</span>
        </div>
        <div class="card text-center border-red-100">
          <span class="text-gray-400 text-sm mb-2 block">💳 Nợ</span>
          <span class="text-2xl font-bold mono text-red-500"
            >15,234,000 VND</span
          >
        </div>
      </section>

      <section class="card mb-10">
        <div class="flex justify-between items-center mb-6">
          <h3 class="text-2xl font-bold text-gray-800">
            Tiến độ FI: <span class="text-green-500 italic">35%</span>
          </h3>
          <span class="text-gray-400 text-sm mono">51,234,000 VND</span>
        </div>

        <div class="progress-container h-5 bg-gray-100 rounded-full mb-4">
          <div
            class="progress-bar bg-green-500 h-full rounded-full"
            style="width: 35%"
          ></div>
        </div>
        <div class="progress-container h-3 bg-gray-50 rounded-full mb-8">
          <div
            class="progress-bar bg-green-200 h-full rounded-full"
            style="width: 20%"
          ></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
          <div class="text-gray-500">
            <p>
              Thời gian đạt mục tiêu:
              <span class="text-gray-800 font-bold">20/5/2030</span>
            </p>
            <p>
              Tiết kiệm mỗi tháng:
              <span class="text-gray-800 font-bold">150,000 VND</span>
            </p>
          </div>
          <div class="md:text-right text-gray-500">
            <p class="italic">Đã tiết kiệm:</p>
            <p class="text-lg font-bold mono text-gray-800">
              5,126,000 / 1.800.000.000
            </p>
          </div>
        </div>
      </section>

      <section class="grid grid-cols-1 xl:grid-cols-3 gap-8">
        <div class="card">
          <h4 class="font-bold mb-6">Thu nhập & Chi tiêu</h4>
          <div class="h-60"><canvas id="monthChart"></canvas></div>
        </div>
        <div class="card">
          <h4 class="font-bold mb-6">Dự đoán mục tiêu FI</h4>
          <div class="h-60"><canvas id="projectionChart"></canvas></div>
        </div>
        <div class="card">
          <h4 class="font-bold mb-6">Giao dịch gần đây</h4>
          <div
            id="transaction-list"
            class="transaction-list space-y-4 max-h-60 overflow-y-auto pr-2"
          ></div>
        </div>
      </section>

      <button class="mt-12 text-blue-400 font-medium" onclick="history.back()">
        ← Quay lại
      </button>
    </main>

    <script src="dashboard.js"></script>
  </body>
</html>
